<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>Daily — Gacha Login Tracker</title>
<style>
  /* ==================================================
     Design tokens
     ================================================== */
  :root {
    --bg: #FAFAFA;
    --sidebar-bg: #F5F5F7;
    --card: #FFFFFF;
    --card-hover: #FFFFFF;
    --border: #E5E5E7;
    --border-strong: #D1D1D6;
    --text: #1C1C1E;
    --text-secondary: #3C3C43;
    --text-muted: #8E8E93;
    --text-faint: #C7C7CC;
    --accent: #007AFF;
    --accent-soft: rgba(0, 122, 255, 0.12);
    --success: #34C759;
    --success-soft: rgba(52, 199, 89, 0.14);
    --warning: #FF9500;
    --warning-soft: rgba(255, 149, 0, 0.14);
    --danger: #FF3B30;
    --danger-soft: rgba(255, 59, 48, 0.12);
    --shadow-card: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.04);
    --shadow-card-hover: 0 4px 16px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
    --shadow-modal: 0 24px 64px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.04);
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 14px;
    --transition: 180ms cubic-bezier(.2, .8, .2, 1);
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", "Segoe UI", Roboto, system-ui, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1C1C1E;
      --sidebar-bg: #000000;
      --card: #2C2C2E;
      --card-hover: #3A3A3C;
      --border: #38383A;
      --border-strong: #48484A;
      --text: #FFFFFF;
      --text-secondary: #EBEBF5;
      --text-muted: #8E8E93;
      --text-faint: #48484A;
      --accent: #0A84FF;
      --accent-soft: rgba(10, 132, 255, 0.2);
      --success: #30D158;
      --success-soft: rgba(48, 209, 88, 0.18);
      --warning: #FF9F0A;
      --warning-soft: rgba(255, 159, 10, 0.18);
      --danger: #FF453A;
      --danger-soft: rgba(255, 69, 58, 0.18);
      --shadow-card: 0 1px 2px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04);
      --shadow-card-hover: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
      --shadow-modal: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
    }
  }

  /* ==================================================
     Reset & base
     ================================================== */
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.4;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
    text-rendering: optimizeLegibility;
  }

  button {
    font-family: inherit;
    font-size: inherit;
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
    padding: 0;
  }

  input, select, textarea {
    font-family: inherit;
    font-size: inherit;
    color: inherit;
  }

  /* ==================================================
     Layout
     ================================================== */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    height: 100vh;
    width: 100vw;
  }

  /* ==================================================
     Sidebar
     ================================================== */
  .sidebar {
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .brand {
    padding: 20px 22px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    user-select: none;
  }

  .brand-mark {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background:
      conic-gradient(from 0deg,
        var(--accent) 0deg 270deg,
        var(--success) 270deg 360deg);
    flex-shrink: 0;
    position: relative;
  }

  .brand-mark::after {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background: var(--sidebar-bg);
  }

  .brand-name {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .nav {
    padding: 6px 10px;
    flex: 1;
    overflow-y: auto;
  }

  .nav-section {
    margin-top: 14px;
  }

  .nav-section:first-child { margin-top: 4px; }

  .nav-section-title {
    padding: 0 12px 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
  }

  .nav-item {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    color: var(--text-secondary);
    transition: background var(--transition), color var(--transition);
    text-align: left;
    margin-bottom: 1px;
  }

  .nav-item:hover {
    background: rgba(0,0,0,0.04);
  }
  @media (prefers-color-scheme: dark) {
    .nav-item:hover { background: rgba(255,255,255,0.06); }
  }

  .nav-item.active {
    background: var(--accent);
    color: white;
    font-weight: 500;
  }

  .nav-item .count {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
  }
  .nav-item.active .count {
    color: rgba(255,255,255,0.78);
  }

  .sidebar-footer {
    padding: 12px 14px 16px;
    border-top: 1px solid var(--border);
  }

  .add-btn {
    width: 100%;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    background: var(--accent);
    color: white;
    font-weight: 500;
    font-size: 13.5px;
    transition: opacity var(--transition), transform var(--transition);
  }
  .add-btn:hover { opacity: 0.9; }
  .add-btn:active { transform: scale(0.98); }

  /* ==================================================
     Main
     ================================================== */
  .main {
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0 40px 80px;
  }

  .main-header {
    padding: 36px 0 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 5;
  }

  .view-title {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.022em;
    margin: 0 0 4px;
    line-height: 1.1;
  }

  .view-subtitle {
    font-size: 14px;
    color: var(--text-muted);
  }

  .section {
    margin-top: 24px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin: 0 0 8px;
    padding: 0 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title .badge {
    background: var(--text-faint);
    color: var(--bg);
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0;
  }
  .section-title.success .badge { background: var(--success); }
  .section-title.warning .badge { background: var(--warning); }

  /* ==================================================
     Game card
     ================================================== */
  .game-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .game-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-card);
    padding: 12px 14px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
  }

  .game-card:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-card-hover);
    background: var(--card-hover);
  }

  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--transition), border-color var(--transition);
    flex-shrink: 0;
  }
  .checkbox.done {
    background: var(--success);
    border-color: var(--success);
  }
  .checkbox.done::after {
    content: '';
    width: 6px;
    height: 11px;
    border-right: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(45deg);
    margin-bottom: 2px;
    animation: check-pop 200ms cubic-bezier(.2, 1.4, .4, 1);
  }
  @keyframes check-pop {
    0% { transform: rotate(45deg) scale(0); }
    100% { transform: rotate(45deg) scale(1); }
  }

  .game-info {
    min-width: 0;
  }

  .game-name {
    font-size: 14.5px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .game-card.done .game-name {
    color: var(--text-muted);
    text-decoration: line-through;
    text-decoration-color: var(--text-faint);
    text-decoration-thickness: 1.5px;
  }

  .color-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .game-meta {
    font-size: 12.5px;
    color: var(--text-muted);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .meta-sep {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--text-faint);
    flex-shrink: 0;
  }

  .meta-note {
    color: var(--text-muted);
    font-style: italic;
  }

  .game-right {
    text-align: right;
    flex-shrink: 0;
  }

  .streak {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 3px;
    justify-content: flex-end;
    line-height: 1.2;
  }
  .streak .flame { font-size: 12px; }
  .streak.zero { color: var(--text-faint); font-weight: 500; }

  .reset-in {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 2px;
    line-height: 1.2;
  }
  .reset-in.urgent { color: var(--warning); font-weight: 500; }
  .reset-in.now { color: var(--accent); font-weight: 600; }

  /* ==================================================
     Empty state
     ================================================== */
  .empty-state {
    text-align: center;
    padding: 96px 32px 64px;
    color: var(--text-muted);
  }
  .empty-state .icon {
    font-size: 40px;
    margin-bottom: 16px;
    opacity: 0.4;
  }
  .empty-state h3 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .empty-state p {
    margin: 0 auto 22px;
    font-size: 14px;
    max-width: 340px;
  }
  .empty-state button {
    background: var(--accent);
    color: white;
    padding: 9px 20px;
    border-radius: var(--radius-sm);
    font-weight: 500;
    font-size: 14px;
  }

  /* ==================================================
     Modal
     ================================================== */
  .modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 200ms ease;
  }
  .modal.open {
    pointer-events: auto;
    opacity: 1;
  }

  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.36);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  .modal-content {
    position: relative;
    background: var(--card);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-modal);
    width: 100%;
    max-width: 420px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 22px 24px 18px;
    transform: scale(0.96) translateY(8px);
    transition: transform 220ms cubic-bezier(.2, .8, .2, 1);
  }
  .modal.open .modal-content {
    transform: scale(1) translateY(0);
  }

  .modal-title {
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 18px;
    letter-spacing: -0.005em;
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .form-group input[type="text"],
  .form-group input[type="time"],
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--bg);
    transition: border-color var(--transition), background var(--transition);
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--card);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 12px;
  }

  .swatches {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .swatch {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform var(--transition), border-color var(--transition);
    padding: 0;
  }
  .swatch:hover { transform: scale(1.08); }
  .swatch.selected {
    border-color: var(--text);
    transform: scale(1.1);
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 22px;
    align-items: center;
  }

  .btn {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-weight: 500;
    font-size: 13.5px;
    transition: opacity var(--transition), transform var(--transition);
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: var(--text-faint); color: var(--text); }
  .btn-danger { background: var(--danger); color: white; margin-right: auto; }

  /* ==================================================
     Sync card
     ================================================== */
  .sync-card {
    padding: 4px 12px 6px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .sync-row {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 6px;
  }
  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-faint);
    flex-shrink: 0;
    transition: background var(--transition);
  }
  .sync-dot.synced { background: var(--success); }
  .sync-dot.syncing { background: var(--warning); animation: sync-pulse 1.2s ease-in-out infinite; }
  .sync-dot.offline { background: var(--danger); }
  @keyframes sync-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  .sync-status {
    font-weight: 500;
    color: var(--text-secondary);
  }
  .sync-code {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 8px;
    cursor: pointer;
    user-select: all;
    word-break: break-all;
    color: var(--text-secondary);
    transition: border-color var(--transition), color var(--transition);
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .sync-code:hover { border-color: var(--accent); }
  .sync-code.copied { border-color: var(--success); color: var(--success); }
  .sync-link {
    font-size: 11.5px;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 0;
    text-align: left;
  }
  .sync-link:hover { text-decoration: underline; }

  /* ==================================================
     Scrollbars
     ================================================== */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.15);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.28); }
  @media (prefers-color-scheme: dark) {
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.24); }
  }
</style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div class="brand-name">Daily</div>
      </div>
      <nav class="nav" id="nav">
        <div class="nav-section">
          <div class="nav-section-title">Library</div>
          <button class="nav-item active" data-view="today">
            <span>Today</span>
            <span class="count" data-count="today">0</span>
          </button>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Sync</div>
          <div class="sync-card">
            <div class="sync-row">
              <span class="sync-dot" id="sync-dot"></span>
              <span class="sync-status" id="sync-status">local only</span>
            </div>
            <div class="sync-code" id="sync-code" title="Click to copy" tabindex="0">···</div>
            <button class="sync-link" id="sync-change" type="button">use a different code</button>
          </div>
        </div>
      </nav>
      <div class="sidebar-footer">
        <button class="add-btn" id="add-btn">+ Add Game</button>
      </div>
    </aside>

    <main class="main" id="main">
      <header class="main-header">
        <h2 class="view-title" id="view-title">Today</h2>
        <div class="view-subtitle" id="view-subtitle"></div>
      </header>
      <div id="sections"></div>
    </main>
  </div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h3 class="modal-title" id="modal-title">Add Game</h3>
      <form id="game-form" autocomplete="off">
        <input type="hidden" name="id">
        <div class="form-group">
          <label for="f-name">Game name</label>
          <input type="text" id="f-name" name="name" required placeholder="Genshin Impact" maxlength="60">
        </div>
        <div class="form-group">
          <label for="f-reset">Daily reset (your time)</label>
          <input type="time" id="f-reset" name="resetTime" required value="04:00">
        </div>
        <div class="form-group">
          <label>Color</label>
          <div class="swatches" id="swatches"></div>
        </div>
        <div class="form-group">
          <label for="f-note">Note (optional)</label>
          <input type="text" id="f-note" name="note" placeholder="Account, server, anything" maxlength="80">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-danger" id="btn-delete" hidden>Delete</button>
          <button type="button" class="btn btn-secondary" data-close>Cancel</button>
          <button type="submit" class="btn btn-primary" id="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

<script>
'use strict';

/* ============================================================
   Constants
   ============================================================ */
const STORAGE_KEY = 'gacha-tracker-v1';
const DEVICE_ID_KEY = 'gacha-device-id-v1';

const COLORS = [
  '#BAE1FF', // blue
  '#BAFFC9', // green
  '#FFFFBA', // yellow
  '#FFDFBA', // orange
  '#FFB3BA', // pink
  '#E0BBE4', // lavender
  '#957DAD', // mauve
  '#D1D1D6', // gray
];

/* ============================================================
   State
   ============================================================ */
let state = {
  games: [],
  view: 'today',
};

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    scheduleSync();
  } catch (e) {
    console.warn('Save failed:', e);
  }
}

/* ============================================================
   Sync (Neon Postgres via /api/sync)
   ============================================================ */
function getDeviceId() {
  let id = localStorage.getItem(DEVICE_ID_KEY);
  if (!id) {
    id = (typeof crypto !== 'undefined' && crypto.randomUUID && crypto.randomUUID())
      || (Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10) + '-' + Math.random().toString(36).slice(2, 10));
    localStorage.setItem(DEVICE_ID_KEY, id);
  }
  return id;
}

let syncState = 'idle'; // idle | syncing | synced | offline
let syncTimer = null;

function updateSyncIndicator() {
  const dot = document.getElementById('sync-dot');
  const status = document.getElementById('sync-status');
  if (!dot || !status) return;
  dot.className = 'sync-dot ' + syncState;
  const labels = { idle: 'local only', syncing: 'syncing…', synced: 'synced', offline: 'offline' };
  status.textContent = labels[syncState] || syncState;
}

function refreshSyncCodeDisplay() {
  const el = document.getElementById('sync-code');
  if (el) el.textContent = getDeviceId();
}

async function pullFromServer() {
  refreshSyncCodeDisplay();
  syncState = 'syncing';
  updateSyncIndicator();
  try {
    const res = await fetch('/api/sync?device_id=' + encodeURIComponent(getDeviceId()), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const { payload } = await res.json();
    if (payload && Array.isArray(payload.games)) {
      state.games = payload.games.map(migrateGame);
      state.view = 'today';
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
      render();
    }
    syncState = 'synced';
  } catch (e) {
    console.warn('Pull failed:', e);
    syncState = 'offline';
  }
  updateSyncIndicator();
}

async function pushToServer() {
  syncState = 'syncing';
  updateSyncIndicator();
  try {
    const res = await fetch('/api/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ device_id: getDeviceId(), payload: state }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    syncState = 'synced';
  } catch (e) {
    console.warn('Push failed:', e);
    syncState = 'offline';
  }
  updateSyncIndicator();
}

function scheduleSync() {
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(pushToServer, 400);
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function migrateGame(g) {
  return {
    id: typeof g.id === 'string' ? g.id : uid(),
    name: typeof g.name === 'string' && g.name.trim() ? g.name : 'Unnamed',
    resetHour: Number.isInteger(g.resetHour) ? g.resetHour : 4,
    resetMinute: Number.isInteger(g.resetMinute) ? g.resetMinute : 0,
    color: typeof g.color === 'string' ? g.color : COLORS[0],
    note: typeof g.note === 'string' ? g.note : '',
    lastLogin: typeof g.lastLogin === 'string' ? g.lastLogin : null,
    createdAt: typeof g.createdAt === 'string' ? g.createdAt : new Date().toISOString(),
  };
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (parsed && Array.isArray(parsed.games)) {
      state.games = parsed.games.map(migrateGame);
      state.view = 'today';
    }
  } catch (e) {
    console.warn('Load failed:', e);
  }
}

/* ============================================================
   Time math
   ============================================================ */
// Reset time is just HH:MM on the device clock. A cycle is "today at
// HH:MM" or "yesterday at HH:MM" depending on whether we've passed it.

function getCycleStart(now, game) {
  const cycle = new Date(now);
  cycle.setHours(game.resetHour, game.resetMinute, 0, 0);
  if (cycle.getTime() > now.getTime()) {
    cycle.setDate(cycle.getDate() - 1);
  }
  return cycle;
}

function getNextCycleStart(now, game) {
  return new Date(getCycleStart(now, game).getTime() + 24 * 3600 * 1000);
}

// Returns 'done' or 'available'
function getStatus(game, now) {
  if (!game.lastLogin) return 'available';
  const currentCycle = getCycleStart(now, game);
  const loginCycle = getCycleStart(new Date(game.lastLogin), game);
  return loginCycle.getTime() === currentCycle.getTime() ? 'done' : 'available';
}

// Counts consecutive cycles (going back from now) where lastLogin landed in that cycle.
// The current cycle counts even if not yet logged in — that's expected.
function getStreak(game, now) {
  if (!game.lastLogin) return 0;
  let cycle = getCycleStart(now, game);
  const loginDate = new Date(game.lastLogin);
  let count = 0;
  let currentCycle = true;
  // Hard cap at 365 to avoid runaway loops on bad data
  for (let i = 0; i < 365; i++) {
    const loginCycle = getCycleStart(loginDate, game);
    if (loginCycle.getTime() === cycle.getTime()) {
      count++;
    } else if (!currentCycle) {
      break;
    }
    cycle = new Date(cycle.getTime() - 24 * 3600 * 1000);
    currentCycle = false;
  }
  return count;
}

function formatResetCountdown(now, game) {
  const ms = getNextCycleStart(now, game).getTime() - now.getTime();
  if (ms <= 0) return { text: 'resetting…', cls: 'now' };
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  let text;
  let cls = '';
  if (h >= 24) {
    const d = Math.floor(h / 24);
    text = `resets in ${d}d ${h % 24}h`;
  } else if (h >= 1) {
    text = `resets in ${h}h ${m}m`;
  } else if (m >= 1) {
    text = `resets in ${m}m`;
    cls = m < 30 ? 'urgent' : '';
  } else {
    text = 'resets in <1m';
    cls = 'now';
  }
  return { text, cls };
}

function formatResetTime(game) {
  return `Resets at ${String(game.resetHour).padStart(2,'0')}:${String(game.resetMinute).padStart(2,'0')}`;
}

/* ============================================================
   Game ops
   ============================================================ */
function addGame(data) {
  const [h, m] = data.resetTime.split(':').map(Number);
  state.games.push({
    id: uid(),
    name: data.name.trim(),
    resetHour: h,
    resetMinute: m,
    color: data.color || COLORS[0],
    note: (data.note || '').trim(),
    lastLogin: null,
    createdAt: new Date().toISOString(),
  });
  save();
  render();
}

function updateGame(id, data) {
  const g = state.games.find(x => x.id === id);
  if (!g) return;
  const [h, m] = data.resetTime.split(':').map(Number);
  g.name = data.name.trim();
  g.resetHour = h;
  g.resetMinute = m;
  g.color = data.color || COLORS[0];
  g.note = (data.note || '').trim();
  save();
  render();
}

function deleteGame(id) {
  state.games = state.games.filter(g => g.id !== id);
  save();
  render();
}

function toggleLogin(id) {
  const g = state.games.find(x => x.id === id);
  if (!g) return;
  const status = getStatus(g, new Date());
  g.lastLogin = status === 'done' ? null : new Date().toISOString();
  save();
  render();
}

/* ============================================================
   DOM helpers
   ============================================================ */
function el(tag, attrs, children) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (v == null || v === false) continue;
      if (k === 'class') node.className = v;
      else if (k === 'style') node.setAttribute('style', v);
      else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
      else if (k === 'dataset') for (const [dk, dv] of Object.entries(v)) node.dataset[dk] = dv;
      else node.setAttribute(k, v);
    }
  }
  if (children != null) {
    const arr = Array.isArray(children) ? children : [children];
    for (const c of arr) {
      if (c == null) continue;
      node.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(String(c)) : c);
    }
  }
  return node;
}

/* ============================================================
   Render
   ============================================================ */
function render() {
  renderSidebar();
  renderMain();
}

function renderSidebar() {
  const now = new Date();
  const remaining = state.games.filter(g => getStatus(g, now) === 'available').length;
  document.querySelector('[data-count="today"]').textContent = remaining;
}

function renderMain() {
  const sectionsEl = document.getElementById('sections');
  const titleEl = document.getElementById('view-title');
  const subtitleEl = document.getElementById('view-subtitle');

  if (state.games.length === 0) {
    titleEl.textContent = 'Today';
    subtitleEl.textContent = '';
    sectionsEl.innerHTML = '';
    sectionsEl.appendChild(renderEmpty());
    return;
  }

  const now = new Date();
  titleEl.textContent = 'Today';
  subtitleEl.textContent = formatDate(now);

  const buckets = { available: [], done: [] };
  state.games.forEach(g => buckets[getStatus(g, now)].push(g));
  // Available first sorted by urgency (next reset ascending), done sorted by name
  buckets.available.sort((a, b) => getNextCycleStart(now, a) - getNextCycleStart(now, b));
  buckets.done.sort((a, b) => a.name.localeCompare(b.name));
  sectionsEl.innerHTML = '';
  if (buckets.available.length) {
    sectionsEl.appendChild(renderSection('Available now', 'warning', buckets.available));
  }
  if (buckets.done.length) {
    sectionsEl.appendChild(renderSection('Logged in today', 'success', buckets.done));
  }
}

function formatDate(d) {
  return d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
}

function renderSection(title, kind, games) {
  const wrap = el('div', { class: 'section' });
  if (title) {
    wrap.appendChild(el('div', { class: `section-title ${kind || ''}` }, [
      title,
      el('span', { class: 'badge' }, String(games.length)),
    ]));
  }
  const list = el('div', { class: 'game-list' });
  games.forEach(g => list.appendChild(renderGameCard(g)));
  wrap.appendChild(list);
  return wrap;
}

function renderGameCard(g) {
  const now = new Date();
  const status = getStatus(g, now);
  const countdown = formatResetCountdown(now, g);
  const streak = getStreak(g, now);
  const resetLabel = formatResetTime(g);

  const card = el('div', {
    class: `game-card ${status === 'done' ? 'done' : ''}`,
    dataset: { id: g.id },
    role: 'button',
    tabindex: '0',
  });

  const checkbox = el('div', {
    class: `checkbox ${status === 'done' ? 'done' : ''}`,
    role: 'checkbox',
    'aria-checked': status === 'done' ? 'true' : 'false',
    'aria-label': status === 'done' ? 'Mark not done' : 'Mark logged in today',
  });
  checkbox.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleLogin(g.id);
  });
  card.appendChild(checkbox);

  const info = el('div', { class: 'game-info' });
  info.appendChild(el('div', { class: 'game-name' }, [
    el('span', { class: 'color-dot', style: `background:${g.color}` }),
    g.name,
  ]));

  const meta = el('div', { class: 'game-meta' }, [resetLabel]);
  if (g.note) {
    meta.appendChild(el('span', { class: 'meta-sep' }));
    meta.appendChild(el('span', { class: 'meta-note' }, g.note));
  }
  info.appendChild(meta);
  card.appendChild(info);

  const right = el('div', { class: 'game-right' });
  if (streak > 0) {
    right.appendChild(el('div', { class: 'streak' }, [
      el('span', { class: 'flame' }, '\u{1F525}'),
      `${streak} day${streak === 1 ? '' : 's'}`,
    ]));
  } else {
    right.appendChild(el('div', { class: 'streak zero' }, ['no streak']));
  }
  right.appendChild(el('div', { class: `reset-in ${countdown.cls}` }, countdown.text));
  card.appendChild(right);

  const open = () => openModal(g.id);
  card.addEventListener('click', open);
  card.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      open();
    }
  });

  return card;
}

function renderEmpty() {
  return el('div', { class: 'empty-state' }, [
    el('div', { class: 'icon' }, '\u{1F3AE}'),
    el('h3', null, 'No games yet'),
    el('p', null, 'Add the gacha games you play and Daily will track each one\'s daily reset — no more mental math at midnight.'),
    el('button', { onclick: () => openModal() }, '+ Add your first game'),
  ]);
}

/* ============================================================
   Modal
   ============================================================ */
function populateSwatches(selected) {
  const wrap = document.getElementById('swatches');
  wrap.innerHTML = '';
  COLORS.forEach(c => {
    const btn = el('button', {
      type: 'button',
      class: `swatch ${c === selected ? 'selected' : ''}`,
      style: `background:${c}`,
      dataset: { color: c },
      'aria-label': `Color ${c}`,
    });
    btn.addEventListener('click', () => {
      wrap.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
      btn.classList.add('selected');
    });
    wrap.appendChild(btn);
  });
}

let editingId = null;

function openModal(id) {
  editingId = id || null;
  const game = id ? state.games.find(g => g.id === id) : null;

  document.getElementById('modal-title').textContent = game ? 'Edit Game' : 'Add Game';
  document.getElementById('btn-delete').hidden = !game;

  const form = document.getElementById('game-form');
  form.reset();
  form.elements.id.value = game?.id || '';
  form.elements.name.value = game?.name || '';
  form.elements.resetTime.value = game
    ? `${String(game.resetHour).padStart(2,'0')}:${String(game.resetMinute).padStart(2,'0')}`
    : '04:00';
  form.elements.note.value = game?.note || '';

  populateSwatches(game?.color || COLORS[0]);

  const modal = document.getElementById('modal');
  modal.hidden = false;
  modal.setAttribute('aria-hidden', 'false');
  requestAnimationFrame(() => modal.classList.add('open'));
  setTimeout(() => form.elements.name.focus(), 60);
}

function closeModal() {
  const modal = document.getElementById('modal');
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
  setTimeout(() => { modal.hidden = true; editingId = null; }, 220);
}

function getSelectedColor() {
  const sel = document.querySelector('#swatches .swatch.selected');
  return sel ? sel.dataset.color : COLORS[0];
}

/* ============================================================
   Wiring
   ============================================================ */
document.getElementById('add-btn').addEventListener('click', () => openModal());

document.querySelectorAll('[data-close]').forEach(n => n.addEventListener('click', closeModal));

document.addEventListener('keydown', (e) => {
  const modal = document.getElementById('modal');
  if (e.key === 'Escape' && !modal.hidden) closeModal();
  // Cmd/Ctrl-N to add a new game
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'n' && modal.hidden) {
    e.preventDefault();
    openModal();
  }
});

document.getElementById('btn-delete').addEventListener('click', () => {
  if (!editingId) return;
  const game = state.games.find(g => g.id === editingId);
  const label = game ? game.name : 'this game';
  if (confirm(`Delete ${label}? Login history will be lost.`)) {
    deleteGame(editingId);
    closeModal();
  }
});

document.getElementById('game-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const f = e.target;
  const data = {
    name: f.elements.name.value.trim(),
    resetTime: f.elements.resetTime.value,
    note: f.elements.note.value,
    color: getSelectedColor(),
  };
  if (!data.name || !data.resetTime) return;
  if (editingId) updateGame(editingId, data);
  else addGame(data);
  closeModal();
});

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    if (state.view === btn.dataset.view) return;
    state.view = btn.dataset.view;
    save();
    render();
  });
});
// (Only "Today" view exists now, but the handler stays in case more views are added later.)

/* ============================================================
   Periodic refresh (countdowns tick over, statuses may flip)
   ============================================================ */
let renderTimer = null;
function scheduleRender() {
  if (renderTimer) return;
  renderTimer = setTimeout(() => {
    renderTimer = null;
    render();
  }, 200);
}
setInterval(scheduleRender, 30 * 1000);
// Also re-render when the tab becomes visible again
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) render();
});

/* ============================================================
   Boot
   ============================================================ */
load();
render();
refreshSyncCodeDisplay();
updateSyncIndicator();
pullFromServer().catch(() => {});

// Sync UI handlers
const codeEl = document.getElementById('sync-code');
if (codeEl) {
  codeEl.addEventListener('click', async () => {
    const code = getDeviceId();
    try {
      await navigator.clipboard.writeText(code);
      codeEl.classList.add('copied');
      const orig = codeEl.textContent;
      codeEl.textContent = 'copied ✓';
      setTimeout(() => {
        codeEl.classList.remove('copied');
        codeEl.textContent = orig;
      }, 1100);
    } catch (e) {
      const range = document.createRange();
      range.selectNodeContents(codeEl);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
  });
}

document.getElementById('sync-change').addEventListener('click', () => {
  const incoming = prompt('Paste a sync code from another device.\nLeave blank and OK to generate a new one.\n\nCurrent: ' + getDeviceId());
  if (incoming === null) return; // cancel
  const trimmed = incoming.trim();
  if (!trimmed) return;
  if (trimmed === getDeviceId()) return;
  if (!confirm('Switch to code "' + trimmed.slice(0, 8) + '…"?\n\nYour local data will be replaced with whatever the server has for that code. Press Cancel and export first if you want to keep it.')) return;
  localStorage.setItem(DEVICE_ID_KEY, trimmed);
  refreshSyncCodeDisplay();
  pullFromServer().catch(() => {});
});

// Pull on tab regain focus so cross-device changes show up when you come back.
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) pullFromServer().catch(() => {});
});
</script>
